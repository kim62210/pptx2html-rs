<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pptx2html-turbo Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
.header { padding: 24px 32px; background: #fff; border-bottom: 1px solid #e0e0e0; }
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 14px; color: #666; margin-top: 4px; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.controls {
  display: none;
  grid-template-columns: 120px minmax(180px, 1fr) 96px;
  gap: 12px;
  align-items: center;
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
}
.controls label { font-size: 14px; font-weight: 600; color: #444; }
.controls input[type="range"] { width: 100%; }
.controls input[type="number"] {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  font-size: 14px;
}
.controls .hint {
  grid-column: 1 / -1;
  font-size: 12px;
  color: #666;
}
.drop-zone {
  border: 2px dashed #ccc; border-radius: 8px; padding: 48px; text-align: center;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
  background: #fff; margin-bottom: 24px;
  display: block;
}
.drop-zone.dragover { border-color: #4472C4; background: #f0f4ff; }
.drop-zone p { font-size: 16px; color: #888; }
.drop-zone .icon { font-size: 36px; margin-bottom: 12px; display: block; color: #bbb; }
.status { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; display: none; }
.status.info { display: block; background: #e8f4fd; color: #1565c0; }
.status.error { display: block; background: #fdecea; color: #c62828; }
.status.success { display: block; background: #e8f5e9; color: #2e7d32; }
.meta { font-size: 13px; color: #666; margin-bottom: 16px; }
.meta span { margin-right: 16px; }
.output-frame {
  width: 100%; min-height: 600px; border: 1px solid #e0e0e0;
  border-radius: 8px; background: #fff; display: none;
}
input[type="file"] {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
</style>
</head>
<body>
<div class="header">
  <h1>pptx2html-turbo Demo</h1>
  <p>Drop a PPTX file to convert it to HTML in your browser — pure Rust/WASM, zero dependencies.</p>
</div>
<div class="container">
  <label class="drop-zone" id="dropZone" for="fileInput">
    <span class="icon">&#128196;</span>
    <p>Drop a .pptx file here or click to select</p>
  </label>
  <input type="file" id="fileInput" accept=".pptx">
  <div class="status" id="status"></div>
  <div class="controls" id="controls">
    <label for="scaleRange">Slide zoom</label>
    <input type="range" id="scaleRange" min="0.5" max="3" step="0.1" value="1">
    <input type="number" id="scaleNumber" min="0.5" max="3" step="0.1" value="1.0">
    <div class="hint">Layout-preserving whole-slide scale. The output grows like an image without changing coordinates or reflowing text.</div>
  </div>
  <div class="meta" id="meta"></div>
  <iframe class="output-frame" id="output" sandbox="allow-same-origin"></iframe>
</div>
<script type="module">
import init, { convert_with_options, get_info } from './pkg/pptx2html_wasm.js';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const status = document.getElementById('status');
const controls = document.getElementById('controls');
const scaleRange = document.getElementById('scaleRange');
const scaleNumber = document.getElementById('scaleNumber');
const meta = document.getElementById('meta');
const output = document.getElementById('output');
let currentBuffer = null;
let currentInfo = null;

function setStatus(msg, type) {
  status.textContent = msg;
  status.className = 'status ' + type;
}

function clampScale(value) {
  const parsed = Number.parseFloat(value);
  if (!Number.isFinite(parsed)) return 1.0;
  return Math.min(3.0, Math.max(0.5, parsed));
}

function syncScaleInputs(value) {
  const scale = clampScale(value);
  scaleRange.value = scale.toFixed(1);
  scaleNumber.value = scale.toFixed(1);
  return scale;
}

function updateMeta() {
  if (!currentInfo) return;
  const scale = clampScale(scaleNumber.value);
  meta.innerHTML =
    '<span>Slides: ' + currentInfo.slide_count + '</span>' +
    '<span>Original: ' + currentInfo.width_px.toFixed(0) + ' x ' + currentInfo.height_px.toFixed(0) + ' px</span>' +
    '<span>Rendered: ' + (currentInfo.width_px * scale).toFixed(0) + ' x ' + (currentInfo.height_px * scale).toFixed(0) + ' px</span>' +
    '<span>Zoom: ' + scale.toFixed(1) + 'x</span>' +
    (currentInfo.title ? '<span>Title: ' + currentInfo.title + '</span>' : '');
}

async function renderCurrentBuffer() {
  if (!currentBuffer) return;
  const scale = clampScale(scaleNumber.value);
  syncScaleInputs(scale);
  updateMeta();
  setStatus('Converting at ' + scale.toFixed(1) + 'x…', 'info');

  try {
    const t0 = performance.now();
    const html = convert_with_options(currentBuffer, true, false, [], scale);
    const elapsed = (performance.now() - t0).toFixed(0);

    output.srcdoc = html;
    output.style.display = 'block';
    setStatus('Converted in ' + elapsed + ' ms (' + (html.length / 1024).toFixed(1) + ' KB HTML, ' + scale.toFixed(1) + 'x zoom)', 'success');
  } catch (e) {
    setStatus('Conversion failed: ' + e.message, 'error');
  }
}

async function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.pptx')) {
    setStatus('Please select a .pptx file.', 'error');
    return;
  }
  setStatus('Loading presentation…', 'info');
  meta.innerHTML = '';
  output.style.display = 'none';

  try {
    currentBuffer = new Uint8Array(await file.arrayBuffer());
    currentInfo = JSON.parse(get_info(currentBuffer));
    controls.style.display = 'grid';
    syncScaleInputs(scaleNumber.value);
    await renderCurrentBuffer();
  } catch (e) {
    setStatus('Conversion failed: ' + e.message, 'error');
  }
}

fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
  e.target.value = '';
});
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
scaleRange.addEventListener('input', () => {
  syncScaleInputs(scaleRange.value);
  updateMeta();
});
scaleRange.addEventListener('change', () => { void renderCurrentBuffer(); });
scaleNumber.addEventListener('input', () => {
  syncScaleInputs(scaleNumber.value);
  updateMeta();
});
scaleNumber.addEventListener('change', () => { void renderCurrentBuffer(); });

init().then(() => setStatus('WASM module loaded — ready to convert.', 'info'));
</script>
</body>
</html>
