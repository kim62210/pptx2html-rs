name: Publish npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      version_tag:
        description: 'Release tag to validate against the package version (for manual publish, e.g. v1.0.4)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: '@briank-dev/pptx2html-turbo'
  PACKAGE_AUTHOR: 'Brian Kim <hyungjoo.drb@gmail.com>'
  PACKAGE_HOMEPAGE: 'https://github.com/kim62210/pptx2html-turbo'
  PACKAGE_BUGS_URL: 'https://github.com/kim62210/pptx2html-turbo/issues'
  PACKAGE_DESCRIPTION: 'Convert PPTX slides to pixel-perfect HTML in the browser — pure Rust/WASM, zero dependencies'

jobs:
  publish:
    name: Build & Publish WASM to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Read release version
        run: |
          chmod +x scripts/read_release_version.sh
          VERSION=$(bash scripts/read_release_version.sh)
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: bash scripts/read_release_version.sh "${{ github.ref_name }}"

      - name: Check manual publish version tag
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false'
        run: bash scripts/read_release_version.sh "${{ github.event.inputs.version_tag }}"

      - name: Prepare validated WASM package
        run: bash scripts/prepare_wasm_release_package.sh "$PACKAGE_VERSION"

      - name: Show package contents
        working-directory: crates/pptx2html-wasm/pkg
        run: |
          echo "=== package.json ==="
          cat package.json
          echo ""
          echo "=== Files ==="
          ls -lh
          echo ""
          echo "=== WASM size ==="
          du -h *.wasm

      - name: Publish to npm (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        working-directory: crates/pptx2html-wasm/pkg
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
        working-directory: crates/pptx2html-wasm/pkg
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
