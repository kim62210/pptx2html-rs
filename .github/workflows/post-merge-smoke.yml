name: Post-merge Smoke

on:
  push:
    branches: [main]

concurrency:
  group: post-merge-smoke
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      result: ${{ steps.result.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npm run build
      - name: Start server
        run: |
          npm run start > server.log 2>&1 &
          echo $! > server.pid
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "server up after ${i}*2 seconds"
              exit 0
            fi
            sleep 2
          done
          echo "::error::server failed to start within 60s"
          cat server.log
          exit 1
      - name: Probe endpoints
        run: |
          curl -sfS --max-time 10 http://localhost:3000/health
          curl -sfS --max-time 10 http://localhost:3000/ | head -c 500 || true
      - name: Record result
        id: result
        if: always()
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT
      - name: Stop server
        if: always()
        run: kill $(cat server.pid) 2>/dev/null || true
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log-${{ github.sha }}
          path: server.log
          retention-days: 14

  notify:
    name: Notify health-monitor
    needs: smoke
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build payload
        id: payload
        run: |
          cat > payload.json <<EOF
          {
            "event": "post_merge_smoke_${{ needs.smoke.outputs.result == 'success' && 'passed' || 'failed' }}",
            "sha": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "repo": "${{ github.repository }}",
            "pusher": "${{ github.actor }}",
            "commit_message": $(jq -Rs . <<< "${{ github.event.head_commit.message }}"),
            "timestamp": "$(date -u +%FT%TZ)"
          }
          EOF
      - name: Send to multica webhook
        if: env.MULTICA_WEBHOOK_URL != ''
        env:
          MULTICA_WEBHOOK_URL: ${{ secrets.MULTICA_WEBHOOK_URL }}
          MULTICA_TOKEN: ${{ secrets.MULTICA_TOKEN }}
        run: |
          curl -X POST "$MULTICA_WEBHOOK_URL" \
            -H "Authorization: Bearer $MULTICA_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @payload.json \
            --max-time 10 --retry 3 --retry-delay 2
