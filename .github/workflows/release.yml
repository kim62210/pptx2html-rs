name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: '@briank-dev/pptx2html-turbo'
  PACKAGE_AUTHOR: 'Brian Kim <hyungjoo.drb@gmail.com>'
  PACKAGE_HOMEPAGE: 'https://github.com/kim62210/pptx2html-turbo'
  PACKAGE_BUGS_URL: 'https://github.com/kim62210/pptx2html-turbo/issues'
  PACKAGE_DESCRIPTION: 'Convert PPTX slides to pixel-perfect HTML in the browser — pure Rust/WASM, zero dependencies'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pptx2html
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pptx2html
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: pptx2html
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: pptx2html
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: pptx2html.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --package pptx2html-cli --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../pptx2html-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../pptx2html-${{ matrix.target }}.zip ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pptx2html-${{ matrix.target }}
          path: pptx2html-${{ matrix.target }}.*

  validate-bindings:
    name: Validate Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: python -m pip install maturin
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Read package version
        run: |
          VERSION=$(grep '^version' crates/pptx2html-wasm/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Build Python wheel
        run: python -m maturin build --manifest-path crates/pptx2html-py/Cargo.toml --features extension-module --interpreter python --out dist
      - name: Install wheel and run runtime smoke tests
        run: |
          python -m pip install dist/*.whl
          python -m unittest discover -s crates/pptx2html-py/tests -v
      - name: Build WASM package
        run: wasm-pack build crates/pptx2html-wasm --target web --release --scope pptx2html
      - name: Copy README and LICENSE
        run: |
          cp crates/pptx2html-wasm/README.md crates/pptx2html-wasm/pkg/
          cp LICENSE crates/pptx2html-wasm/pkg/
      - name: Enhance package.json
        working-directory: crates/pptx2html-wasm/pkg
        run: |
          node -e "
          const pkg = require('./package.json');
          pkg.name = process.env.PACKAGE_NAME;
          pkg.version = process.env.PACKAGE_VERSION;
          pkg.description = process.env.PACKAGE_DESCRIPTION;
          pkg.keywords = ['pptx', 'powerpoint', 'html', 'converter', 'wasm', 'presentation', 'ooxml', 'ecma-376'];
          pkg.author = process.env.PACKAGE_AUTHOR;
          pkg.homepage = process.env.PACKAGE_HOMEPAGE;
          pkg.bugs = { url: process.env.PACKAGE_BUGS_URL };
          pkg.exports = {
            '.': {
              import: './pptx2html_wasm.js',
              types: './pptx2html_wasm.d.ts'
            }
          };
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Run WASM runtime smoke test
        run: node crates/pptx2html-wasm/tests/node-smoke.mjs
      - name: Run package-root smoke test
        run: node crates/pptx2html-wasm/tests/package-root-smoke.mjs
      - name: Check publish package contract
        run: node crates/pptx2html-wasm/tests/check-package-contract.mjs crates/pptx2html-wasm/pkg "$PACKAGE_VERSION"

  release:
    name: Create Release
    needs: [build, validate-bindings]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install evaluate test dependencies
        run: python -m pip install -r evaluate/requirements-test.txt
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Check exactness contract
        run: |
          mkdir -p artifacts/evaluate
          python evaluate/check_exactness_contract.py --repo-root . --output-json artifacts/evaluate/exactness-contract-report.json
      - name: Generate PowerPoint evidence summary
        run: |
          python evaluate/powerpoint_evidence.py summary --golden-set-dir evaluate/golden_set --output-dir evaluate/powerpoint_golden --output-json artifacts/evaluate/powerpoint-evidence-summary.json
          python evaluate/powerpoint_evidence.py gate --family text-layout --golden-set-dir evaluate/golden_set --output-dir evaluate/powerpoint_golden --output-json artifacts/evaluate/powerpoint-evidence-text-layout-gate.json || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
