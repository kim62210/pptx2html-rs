name: Deploy Demo

on:
  push:
    branches: [main]
    paths:
      - 'crates/pptx2html-wasm/**'
      - 'crates/pptx2html-core/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Demo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build crates/pptx2html-wasm --target web --release

      - name: Assemble site
        run: |
          mkdir -p _site/pkg
          cp crates/pptx2html-wasm/demo/index.html _site/
          cp crates/pptx2html-wasm/pkg/pptx2html_wasm.js _site/pkg/
          cp crates/pptx2html-wasm/pkg/pptx2html_wasm_bg.wasm _site/pkg/
          cp crates/pptx2html-wasm/pkg/pptx2html_wasm.d.ts _site/pkg/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
