name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main, 'release/**']

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Run tests
        run: cargo test --workspace
      - name: Build release
        run: cargo build --workspace --release --exclude pptx2html-py

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM (web target)
        run: wasm-pack build crates/pptx2html-wasm --target web --release
      - name: Verify package artifacts
        run: |
          test -f crates/pptx2html-wasm/pkg/package.json
          test -f crates/pptx2html-wasm/pkg/pptx2html_wasm.js
          test -f crates/pptx2html-wasm/pkg/pptx2html_wasm.d.ts
          test -f crates/pptx2html-wasm/pkg/pptx2html_wasm_bg.wasm
          echo "All WASM artifacts present"
      - name: Run WASM runtime smoke test
        run: node crates/pptx2html-wasm/tests/node-smoke.mjs
  python-bindings:
    name: Python Bindings Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: python -m pip install maturin
      - name: Build Python wheel
        run: python -m maturin build --manifest-path crates/pptx2html-py/Cargo.toml --features extension-module --interpreter python --out dist
      - name: Verify wheel artifact
        run: |
          ls dist/*.whl
          echo "Python wheel build succeeded"
      - name: Install wheel and run runtime smoke tests
        run: |
          python -m pip install dist/*.whl
          python -m unittest discover -s crates/pptx2html-py/tests -v
  evaluate-tools:
    name: Evaluate Tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install evaluate test dependencies
        run: python -m pip install -r evaluate/requirements-test.txt
      - name: Run evaluate helper tests
        run: python -m unittest evaluate.tests.test_validate_powerpoint_golden evaluate.tests.test_scaffold_powerpoint_golden_batch evaluate.tests.test_summarize_powerpoint_golden evaluate.tests.test_powerpoint_evidence_cli evaluate.tests.test_check_exactness_contract -v
      - name: Check exactness contract
        run: |
          mkdir -p artifacts/evaluate
          python evaluate/check_exactness_contract.py --repo-root . --output-json artifacts/evaluate/exactness-contract-report.json
      - name: Generate PowerPoint evidence reports
        run: |
          python evaluate/powerpoint_evidence.py summary --golden-set-dir evaluate/golden_set --output-dir evaluate/powerpoint_golden --output-json artifacts/evaluate/powerpoint-evidence-summary.json
          python evaluate/powerpoint_evidence.py gate --family text-layout --golden-set-dir evaluate/golden_set --output-dir evaluate/powerpoint_golden --output-json artifacts/evaluate/powerpoint-evidence-text-layout-gate.json || true
      - name: Upload evaluate artifacts
        uses: actions/upload-artifact@v7
        with:
          name: evaluate-artifacts
          path: artifacts/evaluate/*.json
