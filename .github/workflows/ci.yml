name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Run tests
        run: cargo test --workspace
      - name: Build release
        run: cargo build --workspace --release

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM (web target)
        run: wasm-pack build crates/pptx2html-wasm --target web --release
      - name: Verify package artifacts
        run: |
          test -f crates/pptx2html-wasm/pkg/package.json
          test -f crates/pptx2html-wasm/pkg/pptx2html_wasm.js
          test -f crates/pptx2html-wasm/pkg/pptx2html_wasm.d.ts
          test -f crates/pptx2html-wasm/pkg/pptx2html_wasm_bg.wasm
          echo "All WASM artifacts present"

  python-bindings:
    name: Python Bindings Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: python -m pip install maturin
      - name: Build Python wheel
        run: python -m maturin build --manifest-path crates/pptx2html-py/Cargo.toml --features extension-module --interpreter python --out dist
      - name: Verify wheel artifact
        run: |
          ls dist/*.whl
          echo "Python wheel build succeeded"

  evaluate-tools:
    name: Evaluate Tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install evaluate test dependencies
        run: python -m pip install -r evaluate/requirements-test.txt
      - name: Run evaluate helper tests
        run: python -m unittest evaluate.tests.test_validate_powerpoint_golden evaluate.tests.test_scaffold_powerpoint_golden_batch evaluate.tests.test_summarize_powerpoint_golden evaluate.tests.test_powerpoint_evidence_cli -v
